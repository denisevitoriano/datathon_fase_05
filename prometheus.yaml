global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'api-monitor'
    environment: 'development'

scrape_configs:
  # Prometheus auto-discovery
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Aplicação FastAPI
  - job_name: 'api-app'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
